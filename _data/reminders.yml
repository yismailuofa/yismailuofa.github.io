reminders:
  - englishText: "Do they not look into the realm of the heavens and the earth and everything that Allāh has created and [think] that perhaps their appointed time has come near? So in what statement [i.e., message] hereafter will they believe?"
    cite: "Quran 7:185 - Saheeh International"

  - englishText: |
      Abu Huraira reported Allah's Messenger (ﷺ) as saying:

      A strong believer is better and is more lovable to Allah than a weak believer, and there is good in everyone, (but) cherish that which gives you benefit (in the Hereafter) and seek help from Allah and do not lose heart, and if anything (in the form of trouble) comes to you, don't say: If I had not done that, it would not have happened so and so, but say: Allah did that what He had ordained to do and your" if" opens the (gate) for the Satan.
    cite: "Sahih Muslim 2664"

  - englishText: |
      Buraidah (May Allah be pleased with him) reported:

      The Messenger of Allah (ﷺ) said, "Convey glad tidings to those who walk to the mosque in the darkness. For they will be given full light on the Day of Resurrection."
    cite: "Riyad as-Salihin 1058"

  - englishText: |
      Ibn Abbas reported: The Messenger of Allah (ﷺ), said: 

      Take advantage of five before five: 

      Your youth before your old age, 
      your health before your illness, 
      your riches before your poverty, 
      your free time before your work, 
      and your life before your death.
    cite: "Shu'ab al-Imān 9767"

  - englishText: |
      Abu Huraira reported: The Messenger of Allah (ﷺ), said: 

      When Allah created Paradise and Hellfire, He sent Gabriel to Paradise saying: Behold it and what I have prepared therein for its people. 

      Gabriel came and looked at it and what Allah had prepared therein for its people, then he returned to Allah and he said: By Your might, no one will hear of it but that he will enter it. 

      Allah ordered that it be surrounded by adversity and He said: Return to it and behold what I have prepared therein for its people. 

      Gabriel returned and found that it was surrounded by hardship, then he returned to Allah and he said: By Your might, I fear that no one will enter it. 

      Allah said: Go to the Hellfire and behold it and what I have prepared therein for its people. Gabriel found that it was in layers, one above another, then he returned to Allah and he said: By Your might, no one who hears of it will enter it. 

      Allah ordered that it be surrounded by desires and He said: Return to it. Gabriel returned and he said: By Your might, I fear that no one will escape it.
    cite: "Sunan al-Tirmidhī 2560"

  - englishText: |
      Know that the angel of death who has been assigned to you has not ceased to pass you and move on to others, ever since you have been in this world. But it is as if he is about to pass someone else and move on to target you, so be careful and prepare for him (by correcting your deeds). And do not forget him, for he does not forget you.

    cite: "Uthmān b. ʿAffān - Abū Bakr Al-Daynūrī, Al-Mujālasah wa Jawāhir Al-ʿIlm 2: 73, 74."

  - englishText: |
      But Allah is your protector, and He is the best of helpers.

    cite: "Quran 3:150 - Saheeh International"

  - englishText: |
      Have you not considered how Allāh presents an example, [making] a good word like a good tree, whose root is firmly fixed and its branches [high] in the sky?

      It produces its fruit all the time, by permission of its Lord. And Allāh presents examples for the people that perhaps they will be reminded.

    cite: "Quran 14:25-25 - Saheeh International"

  - englishText: |
      O son of Adam, if you wish to know the magnitude of the blessings that Allah has bestowed upon you then close your eyes.

    cite: "Bakr b. Abdullāh al-Muzanī"

  - englishText: |
      Salamah bin Ubaidullah reported: The Messenger of Allah (ﷺ), said: 

      Whoever among you wakes up physically healthy, feeling safe and secure within himself, with food for the day, it is as if he has acquired the whole world.

    cite: "Sunan Ibn Majah 4141"

  - englishText: |
      Suhaib reported: The Messenger of Allah (ﷺ), said: 

      Strange are the ways of a believer for there is good in every affair of his and this is not the case with anyone else except in the case of a believer for if he has an occasion to feel delight, he thanks (God), thus there is a good for him in it, and if he gets into trouble and shows resignation (and endures it patiently), there is a good for him in it.

    cite: "Sahih Muslim 2999"

  - englishText: |
      Ibn Umar reported: The Messenger of Allah (ﷺ), said: 

      The Messenger of Allah (ﷺ) grabbed me on part of my body and said: 'Be in the world like a stranger or a passerby, and count yourself among the inhabitants of the grave.'

    cite: "Sahih Muslim 2999"

  - englishText: |
      Abu Huraira reported: The Messenger of Allah (ﷺ), said: 

      The example of a believer is that of a fresh green plant the leaves of which move in whatever direction the wind forces them to move and when the wind becomes still, it stand straight. Such is the similitude of the believer: He is disturbed by calamities (but is like the fresh plant he regains his normal state soon). And the example of a disbeliever is that of a pine tree (which remains) hard and straight till Allah cuts it down when He will.

    cite: "Sahih Muslim 7466"

  - englishText: |
      Ibn 'Abbas reported: 

      I was behind the Prophet (ﷺ) one day when he said: 'O boy! I will teach you a statement: Be mindful of Allah and He will protect you. Be mindful of Allah and you will find Him before you. When you ask, ask Allah, and when you seek aid, seek Allah's aid. Know that if the entire creation were to gather together to do something to benefit you- you would never get any benefit except that Allah had written for you. And if they were to gather to do something to harm you- you would never be harmed except that Allah had written for you. The pens are lifted and the pages are dried.'

    cite: "Jami` at-Tirmidhi 2516"

  - englishText: |
      Abu Huraira reported:  The Prophet (ﷺ) said, 

      Religion is very easy and whoever overburdens himself in his religion will not be able to continue in that way. So you should not be extremists, but try to be near to perfection and receive the good tidings that you will be rewarded; and gain strength by worshipping in the mornings, the afternoons, and during the last hours of the nights.

    cite: "Sahih al-Bukhari 39"

  - englishText: |
      Indeed, We have made that which is on the earth adornment for it that We may test them [as to] which of them is best in deed.

      And indeed, We will make that which is upon it [into] a barren ground.

    cite: "Quran 18:7-8 - Saheeh International"

  - englishText: |
      They have not appraised Allāh with true appraisal, while the earth entirely will be [within] His grip on the Day of Resurrection, and the heavens will be folded in His right hand. Exalted is He and high above what they associate with Him.

    cite: "Quran 39:67 - Saheeh International"

  - englishText: |
      Or were they created by nothing, or were they the creators [of themselves]?

      Or did they create the heavens and the earth? Rather, they are not certain.

    cite: "Quran 52:34-35 - Saheeh International"

  - englishText: |
      Umar bin Al-Khattab reported:  The Prophet (ﷺ) said, 

      If you were to rely upon Allah with the required reliance, then He would provide for you just as a bird is provided for, it goes out in the morning empty, and returns full.

    cite: "Jami` at-Tirmidhi 2344"

  - englishText: |
      O you who have believed, seek help through patience and prayer. Indeed, Allāh is with the patient.

      And do not say about those who are killed in the way of Allāh, "They are dead." Rather, they are alive, but you perceive [it] not.

      And We will surely test you with something of fear and hunger and a loss of wealth and lives and fruits, but give good tidings to the patient,

    cite: "Quran 2:153-155 - Saheeh International"
  - englishText: |
      And even if We had sent down to them the angels [with the message] and the dead spoke to them [of it] and We gathered together every [created] thing in front of them, they would not believe unless Allāh should will. But most of them, [of that], are ignorant.
    cite: "Quran 6:111 - Saheeh International"

  - englishText: "Indeed, in the creation of the heavens and the earth, and the alternation of the night and the day, and the [great] ships which sail through the sea with that which benefits people, and what Allāh has sent down from the heavens of rain, giving life thereby to the earth after its lifelessness and dispersing therein every [kind of] moving creature, and [His] directing of the winds and the clouds controlled between the heaven and earth are signs for a people who use reason."
    cite: "Quran 2:164 - Saheeh International"

  - englishText: "Then your hearts became hardened after that, being like stones or even harder. For indeed, there are stones from which rivers burst forth, and there are some of them that split open and water comes out, and there are some of them that fall down for fear of Allāh. And Allāh is not unaware of what you do."
    cite: "Quran 2:74 - Saheeh International"

  - englishText: "But as for he who feared the position of his Lord[1] and prevented the soul from [unlawful] inclination,"
    cite: "Quran 79:40 - Saheeh International"

  - englishText: "Are you a more difficult creation or is the heaven? He [i.e., Allāh] constructed it."
    cite: "Quran 79:27 - Saheeh International"

  - englishText: "And I did not create the jinn and mankind except to worship Me."
    cite: "Quran 51:56 - Saheeh International"

  - englishText: "And the heaven We constructed with strength,[1] and indeed, We are [its] expander."
    cite: "Quran 51:47 - Saheeh International"

  - englishText: "O mankind, what has deceived you concerning your Lord, the Generous,"
    cite: "Quran 82:6 - Saheeh International"

  - englishText: "And brought [within view], that Day, is Hell - that Day, man will remember, but how [i.e., what good] to him will be the remembrance?"
    cite: "Quran 89:23 - Saheeh International"

  - englishText: "How can you disbelieve in Allāh when you were lifeless and He brought you to life; then He will cause you to die, then He will bring you [back] to life, and then to Him you will be returned."
    cite: "Quran 2:28 - Saheeh International"

  - englishText: "And then being among those who believed and advised one another to patience and advised one another to compassion."
    cite: "Quran 90:17 - Saheeh International"

  - englishText: |
      And at the earth - how it is spread out?
      And at the sky - how it is raised?
      And at the mountains - how they are erected?
    cite: "Quran 88:19-20 - Saheeh International"

  - englishText: "Then do they not look at the camels - how they are created?"
    cite: "Quran 88:17 - Saheeh International"

  - englishText: "[They will be] reclining therein on adorned couches. They will not see therein any [burning] sun or [freezing] cold."
    cite: "Quran 76:13 - Saheeh International"

  - englishText: "And they give food in spite of love for it[1] to the needy, the orphan, and the captive,"
    cite: "Quran 76:8 - Saheeh International"

  - englishText: |
      Had he not been a sperm from semen emitted?
      Is not that [Creator] Able to give life to the dead?
      Does man think that he will be left neglected?[1]
      Then he was a clinging clot, and [Allāh] created [his form] and proportioned [him]
      And made of him two mates, the male and the female.
    cite: "Quran 75:37-39 - Saheeh International"

  - englishText: |
      Then upon Us is its clarification [to you].
      So when We have recited it [through Gabriel], then follow its recitation.
      Indeed, upon Us is its collection [in your heart] and [to make possible] its recitation.
      Move not your tongue with it, [O Muḥammad], to hasten with it [i.e., recitation of the Qur’ān].
    cite: "Quran 75:16-19 - Saheeh International"

  - englishText: |
      As if they were alarmed donkeys.
      Fleeing from a lion?
      Then what is [the matter] with them that they are, from the reminder, turning away.
    cite: "Quran 74:49-50 - Saheeh International"

  - englishText: "Then how can you fear, if you disbelieve, a Day that will make the children white-haired?[1]"
    cite: "Quran 73:17 - Saheeh International"

  - englishText: |
      Indeed, the hours of the night are more effective for concurrence [of heart and tongue][1] and more suitable for words.[2]
      Indeed, for you by day is prolonged occupation.
    cite: "Quran 73:6-7 - Saheeh International"

  - englishText: "Do they not see the birds above them with wings outspread and [sometimes] folded in? None holds them [aloft] except the Most Merciful. Indeed He is, of all things, Seeing."
    cite: "Quran 67:19 - Saheeh International"

  - englishText: |
      And We have certainly beautified the nearest heaven with lamps [i.e., stars] and have made [from] them what is thrown at the devils[1] and have prepared for them the punishment of the Blaze.
      [And] who created seven heavens in layers.[1] You do not see in the creation of the Most Merciful any inconsistency. So return [your] vision [to the sky]; do you see any breaks?
      Then return [your] vision twice again.[1] [Your] vision will return to you humbled while it is fatigued.
    cite: "Quran 67:4-5 - Saheeh International"

  - englishText: "O you who have believed, protect yourselves and your families from a Fire whose fuel is people and stones, over which are [appointed] angels, harsh and severe; they do not disobey Allāh in what He commands them but do what they are commanded."
    cite: "Quran 66:6 - Saheeh International"

  - englishText: "O you who have believed, shall I guide you to a transaction that will save you from a painful punishment?"
    cite: "Quran 61:10 - Saheeh International"

  - englishText: "[It is that] you believe in Allāh and His Messenger and strive in the cause of Allāh with your wealth and your lives. That is best for you, if you only knew."
    cite: "Quran 61:11 - Saheeh International"

  - englishText: "He is Allāh, the Creator,[1] the Producer,[2] the Fashioner;[3] to Him belong the best names.[4] Whatever is in the heavens and earth is exalting Him. And He is the Exalted in Might, the Wise.[5]"
    cite: "Quran 59:24 - Saheeh International"

  - englishText: "He is Allāh, other than whom there is no deity, the Sovereign,[1] the Pure,[2] the Perfection,[3] the Grantor of Security,[4] the Overseer,[5] the Exalted in Might,[6] the Compeller,[7] the Superior.[8] Exalted is Allāh above whatever they associate with Him."
    cite: "Quran 59:23 - Saheeh International"

  - englishText: "If We had sent down this Qur’ān upon a mountain, you would have seen it humbled and splitting from fear of Allāh. And these examples We present to the people that perhaps they will give thought."
    cite: "Quran 59:21 - Saheeh International"

  - englishText: "Race [i.e., compete] toward forgiveness from your Lord and a Garden whose width is like the width of the heavens and earth, prepared for those who believed in Allāh and His messengers. That is the bounty of Allāh which He gives to whom He wills, and Allāh is the possessor of great bounty."
    cite: "Quran 57:21 - Saheeh International"

  - englishText: "Know that the life of this world is but amusement and diversion and adornment and boasting to one another and competition in increase of wealth and children - like the example of a rain whose [resulting] plant growth pleases the tillers; then it dries and you see it turned yellow; then it becomes [scattered] debris. And in the Hereafter is severe punishment and forgiveness from Allāh and approval. And what is the worldly life except the enjoyment of delusion."
    cite: "Quran 57:20 - Saheeh International"

  - englishText: |
      And indeed, it is an oath - if you could know - [most] great.
      Then I swear by the setting of the stars,[1]
    cite: "Quran 56:75-76 - Saheeh International"

  - englishText: "We have made it a reminder[1] and provision for the travelers,[2]"
    cite: "Quran 56:73 - Saheeh International"

  - englishText: |
      And on the earth are signs for the certain [in faith]
      And in yourselves. Then will you not see?
    cite: "Quran 51:20-21 - Saheeh International"

  - englishText: "O you who have believed, avoid much [negative] assumption. Indeed, some assumption is sin. And do not spy or backbite each other. Would one of you like to eat the flesh of his brother when dead? You would detest it. And fear Allāh; indeed, Allāh is Accepting of Repentance and Merciful."
    cite: "Quran 49:12 - Saheeh International"

  - englishText: "Then do they not reflect upon the Qur’ān, or are there locks upon [their] hearts?"
    cite: "Quran 47:24 - Saheeh International"

  - englishText: "Is the description of Paradise, which the righteous are promised, wherein are rivers of water unaltered,[1] rivers of milk the taste of which never changes, rivers of wine delicious to those who drink, and rivers of purified honey, in which they will have from all [kinds of] fruits and forgiveness from their Lord... [Are its inhabitants] like those who abide eternally in the Fire and are given to drink scalding water that will sever their intestines?"
    cite: "Quran 47:15 - Saheeh International"

  - englishText: "And We have enjoined upon man, to his parents, good treatment. His mother carried him with hardship and gave birth to him with hardship, and his gestation and weaning [period] is thirty months. [He grows] until, when he reaches maturity and reaches [the age of] forty years, he says, My Lord, enable me[1] to be grateful for Your favor which You have bestowed upon me and upon my parents and to work righteousness of which You will approve and make righteous for me my offspring. Indeed, I have repented to You, and indeed, I am of the Muslims."
    cite: "Quran 46:15 - Saheeh International"

  - englishText: |
      Have you seen he who has taken as his god his [own] desire, and Allāh has sent him astray due to knowledge[1] and has set a seal upon his hearing and his heart and put over his vision a veil? So who will guide him after Allāh? Then will you not be reminded?
      And they say, There is not but our worldly life; we die and live,[1] and nothing destroys us except time. And they have of that no knowledge; they are only assuming.
    cite: "Quran 45:23-24 - Saheeh International"

  - englishText: "And Allāh created the heavens and earth in truth and so that every soul may be recompensed for what it has earned, and they will not be wronged."
    cite: "Quran 45:22 - Saheeh International"

  - englishText: "And in the creation of yourselves and what He disperses of moving creatures are signs for people who are certain [in faith]."
    cite: "Quran 45:4 - Saheeh International"

  - englishText: |
      And gold ornament. But all that is not but the enjoyment of worldly life. And the Hereafter with your Lord is for the righteous.
      And for their houses - doors and couches [of silver] upon which to recline
    cite: "Quran 43:34-35 - Saheeh International"

  - englishText: "And if it were not that the people would become one community [of disbelievers],[1] We would have made for those who disbelieve in the Most Merciful - for their houses - ceilings and stairways of silver upon which to mount."
    cite: "Quran 43:33 - Saheeh International"

  - englishText: "And whoever is patient and forgives - indeed, that is of the matters [worthy] of resolve.[1]"
    cite: "Quran 42:43 - Saheeh International"

  - englishText: |
      And those who avoid the major sins and immoralities, and when they are angry, they forgive,
      So whatever thing you have been given - it is but [for] enjoyment of the worldly life. But what is with Allāh is better and more lasting for those who have believed and upon their Lord rely
      And those who, when tyranny strikes them, they retaliate [in a just manner].[1]
      And those who have responded to their Lord and established prayer and whose affair is [determined by] consultation among themselves, and from what We have provided them, they spend,
    cite: "Quran 42:37-38 - Saheeh International"

  - englishText: "Whoever desires the harvest of the Hereafter - We increase for him in his harvest [i.e., reward]. And whoever desires the harvest [i.e., benefits] of this world - We give him thereof, but there is not for him in the Hereafter any share."
    cite: "Quran 42:20 - Saheeh International"

  - englishText: "And if there comes to you from Satan an evil suggestion, then seek refuge in Allāh. Indeed, He is the Hearing, the Knowing."
    cite: "Quran 41:36 - Saheeh International"

  - englishText: "The creation of the heavens and earth is greater than the creation of mankind, but most of the people do not know."
    cite: "Quran 40:57 - Saheeh International"

  - englishText: "And protect them from the evil consequences [of their deeds]. And he whom You protect from evil consequences that Day - You will have given him mercy. And that is the great attainment."
    cite: "Quran 40:9 - Saheeh International"

  - englishText: "Say, O My servants who have transgressed against themselves [by sinning], do not despair of the mercy of Allāh. Indeed, Allāh forgives all sins.[1] Indeed, it is He who is the Forgiving, the Merciful."
    cite: "Quran 39:53 - Saheeh International"

  - englishText: "And if those who did wrong had all that is in the earth entirely and the like of it with it, they would [attempt to] ransom themselves thereby from the worst of the punishment on the Day of Resurrection. And there will appear to them from Allāh that which they had not taken into account.[1]"
    cite: "Quran 39:47 - Saheeh International"

  - englishText: "He created you from one soul. Then He made from it its mate, and He produced for you from the grazing livestock eight mates.[1] He creates you in the wombs of your mothers, creation after creation, within three darknesses.[2] That is Allāh, your Lord; to Him belongs dominion. There is no deity except Him, so how are you averted?"
    cite: "Quran 39:6 - Saheeh International"

  - englishText: "And he said, Indeed, I gave preference to the love of good [things] over the remembrance of my Lord until it [i.e., the sun] disappeared into the curtain [of darkness]."
    cite: "Quran 38:32 - Saheeh International"

  - englishText: "A speaker among them will say, Indeed, I had a companion [on earth]."
    cite: "Quran 37:51 - Saheeh International"

  - englishText: "It is not allowable [i.e., possible] for the sun to reach the moon, nor does the night overtake the day, but each, in an orbit, is swimming."
    cite: "Quran 36:40 - Saheeh International"

  - englishText: "And a sign for them is the night. We remove[1] from it the [light of] day, so they are [left] in darkness."
    cite: "Quran 36:37 - Saheeh International"

  - englishText: "Exalted is He who created all pairs[1] - from what the earth grows and from themselves and from that which they do not know."
    cite: "Quran 36:36 - Saheeh International"

  - englishText: "Say, Indeed, my Lord extends provision for whom He wills of His servants and restricts [it] for him. But whatever thing you spend [in His cause] - He will compensate it; and He is the best of providers."
    cite: "Quran 34:39 - Saheeh International"

  - englishText: "And when We decreed for him [i.e., Solomon] death, nothing indicated to them [i.e., the jinn] his death except a creature of the earth eating his staff.[1] But when he fell, it became clear to the jinn that if they had known the unseen, they would not have remained in humiliating punishment.[2]"
    cite: "Quran 34:14 - Saheeh International"

  - englishText: "But those who strive against Our verses [seeking] to cause failure[1] - for them will be a painful punishment of foul nature."
    cite: "Quran 34:5 - Saheeh International"

  - englishText: "He knows what penetrates into the earth and what emerges from it and what descends from the heaven and what ascends therein. And He is the Merciful, the Forgiving."
    cite: "Quran 34:2 - Saheeh International"

  - englishText: "It is He who confers blessing upon you,[1] and His angels [ask Him to do so] that He may bring you out from darknesses into the light. And ever is He, to the believers, Merciful."
    cite: "Quran 33:43 - Saheeh International"

  - englishText: "Indeed, the Muslim men and Muslim women, the believing men and believing women, the obedient men and obedient women, the truthful men and truthful women, the patient men and patient women, the humble men and humble women, the charitable men and charitable women, the fasting men and fasting women, the men who guard their private parts and the women who do so, and the men who remember Allāh often and the women who do so - for them Allāh has prepared forgiveness and a great reward."
    cite: "Quran 33:35 - Saheeh International"

  - englishText: "Their sides part [i.e., they arise] from [their] beds; they supplicate their Lord in fear and aspiration, and from what We have provided them, they spend.[1]"
    cite: "Quran 32:16 - Saheeh International"

  - englishText: "Only those believe in Our verses who, when they are reminded by them, fall down in prostration and exalt [Allāh] with praise of their Lord, and they are not arrogant."
    cite: "Quran 32:15 - Saheeh International"

  - englishText: "And if We had willed, We could have given every soul its guidance, but the word[1] from Me will come into effect [that] I will surely fill Hell with jinn and people all together."
    cite: "Quran 32:13 - Saheeh International"

  - englishText: |
      Then He made his posterity out of the extract of a liquid disdained.
      Who perfected everything which He created and began the creation of man from clay.
    cite: "Quran 32:7-8 - Saheeh International"

  - englishText: "He arranges [each] matter from the heaven to the earth; then it will ascend to Him in a Day, the extent of which is a thousand years of those which you count."
    cite: "Quran 32:5 - Saheeh International"

  - englishText: "Indeed, Allāh [alone] has knowledge of the Hour and sends down the rain and knows what is in the wombs.[1] And no soul perceives what it will earn tomorrow, and no soul perceives in what land it will die. Indeed, Allāh is Knowing and Aware."
    cite: "Quran 31:34 - Saheeh International"

  - englishText: "And when waves come over them like canopies, they supplicate Allāh, sincere to Him in religion [i.e., faith]. But when He delivers them to the land, there are [some] of them who are moderate [in faith]. And none rejects Our signs except everyone treacherous and ungrateful."
    cite: "Quran 31:32 - Saheeh International"

  - englishText: "And if whatever trees upon the earth were pens and the sea [was ink], replenished thereafter by seven [more] seas, the words[1] of Allāh would not be exhausted. Indeed, Allāh is Exalted in Might and Wise."
    cite: "Quran 31:27 - Saheeh International"

  - englishText: "And We have enjoined upon man [care] for his parents. His mother carried him, [increasing her] in weakness upon weakness, and his weaning is in two years. Be grateful to Me and to your parents; to Me is the [final] destination."
    cite: "Quran 31:14 - Saheeh International"

  - englishText: "But those who wrong follow their [own] desires without knowledge. Then who can guide one whom Allāh has sent astray? And for them there are no helpers."
    cite: "Quran 30:29 - Saheeh International"

  - englishText: "And of His signs is the creation of the heavens and the earth and the diversity of your languages and your colors. Indeed in that are signs for those of knowledge."
    cite: "Quran 30:22 - Saheeh International"

  - englishText: "They know what is apparent of the worldly life, but they, of the Hereafter, are unaware."
    cite: "Quran 30:7 - Saheeh International"

  - englishText: "And when they board a ship, they supplicate Allāh, sincere to Him in religion [i.e., faith and hope]. But when He delivers them to the land, at once they associate others with Him"
    cite: "Quran 29:65 - Saheeh International"

  - englishText: "And this worldly life is not but diversion and amusement. And indeed, the home of the Hereafter - that is the [eternal] life, if only they knew."
    cite: "Quran 29:64 - Saheeh International"

  - englishText: "Allāh extends provision for whom He wills of His servants and restricts for him. Indeed Allāh is, of all things, Knowing."
    cite: "Quran 29:62 - Saheeh International"

  - englishText: "And how many a creature carries not its [own] provision. Allāh provides for it and for you. And He is the Hearing, the Knowing."
    cite: "Quran 29:60 - Saheeh International"

  - englishText: "Recite, [O Muḥammad], what has been revealed to you of the Book and establish prayer. Indeed, prayer prohibits immorality and wrongdoing, and the remembrance of Allāh is greater. And Allāh knows that which you do."
    cite: "Quran 29:45 - Saheeh International"

  - englishText: "The example of those who take allies other than Allāh is like that of the spider who takes [i.e., constructs] a home. And indeed, the weakest of homes is the home of the spider, if they only knew."
    cite: "Quran 29:41 - Saheeh International"

  - englishText: "He said, My Lord, prison is more to my liking than that to which they invite me. And if You do not avert from me their plan, I might incline toward them and [thus] be of the ignorant."
    cite: "Quran 12:33 - Saheeh International"

  - englishText: "Whoever should hope for the meeting with Allāh - indeed, the term [decreed by] Allāh is coming. And He is the Hearing, the Knowing."
    cite: "Quran 29:5 - Saheeh International"

  - englishText: "Say, Have you considered: if Allāh should make for you the day continuous until the Day of Resurrection, what deity other than Allāh could bring you a night in which you may rest? Then will you not see?"
    cite: "Quran 28:72 - Saheeh International"

  - englishText: "Say, Have you considered:[1] if Allāh should make for you the night continuous until the Day of Resurrection, what deity other than Allāh could bring you light? Then will you not hear?"
    cite: "Quran 28:71 - Saheeh International"

  - englishText: "Then is he whom We have promised a good promise which he will meet [i.e., obtain] like he for whom We provided enjoyment of worldly life [but] then he is, on the Day of Resurrection, among those presented [for punishment in Hell]?"
    cite: "Quran 28:61 - Saheeh International"

  - englishText: "And you see the mountains, thinking them motionless,[1] while they will pass as the passing of clouds. [It is] the work of Allāh, who perfected all things. Indeed, He is Aware of that which you do."
    cite: "Quran 27:88 - Saheeh International"

  - englishText: "And who I aspire that He will forgive me my sin on the Day of Recompense."
    cite: "Quran 26:82 - Saheeh International"

  - englishText: "And those who say, Our Lord, grant us from among our wives and offspring comfort to our eyes[1] and make us a leader [i.e., example] for the righteous."
    cite: "Quran 25:74 - Saheeh International"

  - englishText: "And [they are] those who, when they spend, do so not excessively or sparingly but are ever, between that, [justly] moderate"
    cite: "Quran 25:67 - Saheeh International"

  - englishText: "And the servants of the Most Merciful are those who walk upon the earth easily,[1] and when the ignorant address them [harshly], they say [words of] peace,[2]"
    cite: "Quran 25:63 - Saheeh International"

  - englishText: "And it is He who has released [simultaneously] the two seas [i.e., bodies of water], one fresh and sweet and one salty and bitter, and He placed between them a barrier and prohibiting partition."
    cite: "Quran 25:53 - Saheeh International"

  - englishText: "And it is He who has made the night for you as clothing[1] and sleep [a means for] rest and has made the day a resurrection.[2]"
    cite: "Quran 25:47 - Saheeh International"

  - englishText: "And [mention] the Day when the heaven will split open with [emerging] clouds,[1] and the angels will be sent down in successive descent."
    cite: "Quran 25:25 - Saheeh International"

  - englishText: "Do you not see that Allāh drives clouds? Then He brings them together; then He makes them into a mass, and you see the rain emerge from within it. And He sends down from the sky, mountains [of clouds] within which is hail, and He strikes with it whom He wills and averts it from whom He wills. The flash of its lightning almost takes away the eyesight."
    cite: "Quran 24:43 - Saheeh International"

  - englishText: "Do you not see that Allāh is exalted by whomever is within the heavens and the earth and [by] the birds with wings spread [in flight]? Each [of them] has known his [means of] prayer and exalting [Him], and Allāh is Knowing of what they do."
    cite: "Quran 24:41 - Saheeh International"

  - englishText: "Or [they are] like darknesses within an unfathomable sea which is covered by waves, upon which are waves, over which are clouds - darknesses, some of them upon others. When one puts out his hand [therein], he can hardly see it. And he to whom Allāh has not granted light - for him there is no light."
    cite: "Quran 24:40 - Saheeh International"

  - englishText: "But those who disbelieved - their deeds are like a mirage in a lowland which a thirsty one thinks is water until, when he comes to it, he finds it is nothing but finds Allāh before him, and He will pay him in full his due; and Allāh is swift in account."
    cite: "Quran 24:39 - Saheeh International"

  - englishText: "Allāh is the Light[1] of the heavens and the earth. The example of His light[2] is like a niche within which is a lamp;[3] the lamp is within glass, the glass as if it were a pearly [white] star lit from [the oil of] a blessed olive tree, neither of the east nor of the west, whose oil would almost glow even if untouched by fire. Light upon light. Allāh guides to His light whom He wills. And Allāh presents examples for the people, and Allāh is Knowing of all things."
    cite: "Quran 24:35 - Saheeh International"

  - englishText: "Do you not see that Allāh has subjected to you whatever is on the earth and the ships which run through the sea by His command? And He restrains the sky from falling upon the earth, unless by His permission. Indeed Allāh, to the people, is Kind and Merciful."
    cite: "Quran 22:65 - Saheeh International"

  - englishText: "And of the people is he who worships Allāh on an edge.[1] If he is touched by good, he is reassured by it; but if he is struck by trial, he turns on his face [to unbelief]. He has lost [this] world and the Hereafter. That is what is the manifest loss."
    cite: "Quran 22:11 - Saheeh International"

  - englishText: "So whoever does righteous deeds while he is a believer - no denial will there be for his effort,[1] and indeed We [i.e., Our angels], of it, are recorders."
    cite: "Quran 21:94 - Saheeh International"

  - englishText: "And We did not grant to any man before you eternity [on earth]; so if you die - would they be eternal?"
    cite: "Quran 21:34 - Saheeh International"

  - englishText: |
      And We placed within the earth firmly set mountains, lest it should shift with them, and We made therein [mountain] passes [as] roads that they might be guided.
      And We made the sky a protected ceiling, but they, from its signs,[1] are turning away.
    cite: "Quran 21:31-32 - Saheeh International"

  - englishText: "Have those who disbelieved not considered that the heavens and the earth were a joined entity, and then We separated them and made from water every living thing? Then will they not believe?"
    cite: "Quran 21:30 - Saheeh International"

  - englishText: "And do not extend your eyes toward that by which We have given enjoyment to [some] categories of them, [its being but] the splendor of worldly life by which We test them. And the provision of your Lord is better and more enduring."
    cite: "Quran 20:131 - Saheeh International"

  - englishText: "That Day, they [i.e., everyone] will follow [the call of] the Caller[1] [with] no deviation therefrom, and [all] voices will be stilled before the Most Merciful, so you will not hear except a whisper [of footsteps]."
    cite: "Quran 20:108 - Saheeh International"

  - englishText: "But there came after them successors [i.e., later generations] who neglected prayer and pursued desires; so they are going to meet evil[1] -"
    cite: "Quran 19:59 - Saheeh International"

  - englishText: "Say, If the sea were ink for [writing] the words[1] of my Lord, the sea would be exhausted before the words of my Lord were exhausted, even if We brought the like of it in [continual] supplement."
    cite: "Quran 18:109 - Saheeh International"

  - englishText: "And the record [of deeds] will be placed [open], and you will see the criminals fearful of that within it, and they will say, Oh, woe to us! What is this book that leaves nothing small or great except that it has enumerated it? And they will find what they did present [before them]. And your Lord does injustice to no one."
    cite: "Quran 18:49 - Saheeh International"

  - englishText: "Wealth and children are [but] adornment of the worldly life. But the enduring good deeds are better to your Lord[1] for reward and better for [one's] hope."
    cite: "Quran 18:46 - Saheeh International"

  - englishText: "And [warn of] the Day when We will remove the mountains and you will see the earth exposed,[1] and We will gather them and not leave behind from them anyone."
    cite: "Quran 18:47 - Saheeh International"

  - englishText: "And say, The truth is from your Lord, so whoever wills - let him believe; and whoever wills - let him disbelieve. Indeed, We have prepared for the wrongdoers a fire whose walls will surround them. And if they call for relief, they will be relieved with water like murky oil, which scalds [their] faces. Wretched is the drink, and evil is the resting place."
    cite: "Quran 18:29 - Saheeh International"

  - englishText: "Except [when adding], If Allāh wills. And remember your Lord when you forget [it] and say, Perhaps my Lord will guide me to what is nearer than this to right conduct."
    cite: "Quran 18:24 - Saheeh International"

  - englishText: "And never say of anything, Indeed, I will do that tomorrow,"
    cite: "Quran 18:23 - Saheeh International"

  - englishText: "Indeed, We have made that which is on the earth adornment for it that We may test them [as to] which of them is best in deed."
    cite: "Quran 18:7 - Saheeh International"

  - englishText: "Indeed, those who fear Allāh - when an impulse touches them from Satan, they remember [Him] and at once they have insight."
    cite: "Quran 7:201 - Saheeh International"

  - englishText: "Say, If there were upon the earth angels walking securely,[1] We would have sent down to them from the heaven an angel [as a] messenger."
    cite: "Quran 17:95 - Saheeh International"

  - englishText: "And they ask you, [O Muḥammad], about the soul. Say, The soul is of the affair [i.e., concern] of my Lord. And you [i.e., mankind] have not been given of knowledge except a little."
    cite: "Quran 17:85 - Saheeh International"

  - englishText: "And say, My Lord, cause me to enter a sound entrance[1] and to exit a sound exit[2] and grant me from Yourself a supporting authority."
    cite: "Quran 17:80 - Saheeh International"

  - englishText: "And when adversity touches you at sea, lost are [all] those you invoke except for Him. But when He delivers you to the land, you turn away [from Him]. And ever is man ungrateful."
    cite: "Quran 17:67 - Saheeh International"

  - englishText: "And tell My servants to say that which is best. Indeed, Satan induces [dissension] among them. Indeed Satan is ever, to mankind, a clear enemy."
    cite: "Quran 17:53 - Saheeh International"

  - englishText: "Or [any] creation of that which is great[1] within your breasts. And they will say, Who will restore us? Say, He who brought you forth the first time. Then they will nod their heads toward you[2] and say, When is that? Say, Perhaps it will be soon -"
    cite: "Quran 17:51 - Saheeh International"

  - englishText: "And do not walk upon the earth exultantly. Indeed, you will never tear the earth [apart], and you will never reach the mountains in height.[1]"
    cite: "Quran 17:37 - Saheeh International"

  - englishText: "And do not make your hand [as] chained to your neck[1] or extend it completely[2] and [thereby] become blamed and insolvent."
    cite: "Quran 17:29 - Saheeh International"

  - englishText: "And give the relative his right, and [also] the poor and the traveler, and do not spend wastefully.[1]"
    cite: "Quran 17:26 - Saheeh International"

  - englishText: "Indeed, the wasteful are brothers of the devils, and ever has Satan been to his Lord ungrateful."
    cite: "Quran 17:27 - Saheeh International"

  - englishText: "And lower to them the wing of humility out of mercy and say, My Lord, have mercy upon them as they brought me up [when I was] small."
    cite: "Quran 17:24 - Saheeh International"

  - englishText: "Look how We have favored [in provision] some of them over others. But the Hereafter is greater in degrees [of difference] and greater in distinction."
    cite: "Quran 17:21 - Saheeh International"

  - englishText: "And do not be like she who untwisted her spun thread after it was strong [by] taking your oaths as [means of] deceit between you because one community is more plentiful [in number or wealth] than another community.[1] Allāh only tries you thereby. And He will surely make clear to you on the Day of Resurrection that over which you used to differ."
    cite: "Quran 16:92 - Saheeh International"

  - englishText: "And Allāh created you; then He will take you in death. And among you is he who is reversed to the most decrepit [old] age so that he will not know, after [having had] knowledge, a thing. Indeed, Allāh is Knowing and Competent."
    cite: "Quran 16:70 - Saheeh International"

  - englishText: "Then eat from all the fruits[1] and follow the ways of your Lord laid down [for you]. There emerges from their bellies a drink, varying in colors, in which there is healing for people. Indeed in that is a sign for a people who give thought."
    cite: "Quran 16:69 - Saheeh International"

  - englishText: "And indeed, for you in grazing livestock is a lesson. We give you drink from what is in their bellies - between excretion and blood - pure milk, palatable to drinkers."
    cite: "Quran 16:66 - Saheeh International"

  - englishText: "And He has cast into the earth firmly set mountains, lest it shift with you, and [made] rivers and roads, that you may be guided,"
    cite: "Quran 16:15 - Saheeh International"

  - englishText: "And the earth - We have spread it and cast therein firmly set mountains and caused to grow therein [something] of every well-balanced thing."
    cite: "Quran 15:19 - Saheeh International"

  - englishText: "And [even] if We opened to them a gate from the heaven and they continued therein to ascend,"
    cite: "Quran 15:14 - Saheeh International"

  - englishText: "And never think that Allāh is unaware of what the wrongdoers do. He only delays them [i.e., their account] for a Day when eyes will stare [in horror]."
    cite: "Quran 14:42 - Saheeh International"

  - englishText: "My Lord, make me an establisher of prayer, and [many] from my descendants. Our Lord, and accept my supplication."
    cite: "Quran 14:40 - Saheeh International"

  - englishText: "And He gave you from all you asked of Him.[1] And if you should count the favor [i.e., blessings] of Allāh, you could not enumerate them. Indeed, mankind is [generally] most unjust and ungrateful.[2]"
    cite: "Quran 14:34 - Saheeh International"

  - englishText: "For him [i.e., each one] are successive [angels][1] before and behind him who protect him by the decree of Allāh.[2] Indeed, Allāh will not change the condition of a people until they change what is in themselves. And when Allāh intends for a people ill,[3] there is no repelling it. And there is not for them besides Him any patron."
    cite: "Quran 13:11 - Saheeh International"

  - englishText: "Have you not considered how Allāh presents an example, [making] a good word like a good tree, whose root is firmly fixed and its branches [high] in the sky?"
    cite: "Quran 14:24 - Saheeh International"

  - englishText: "The example of those who disbelieve in their Lord is [that] their deeds are like ashes which the wind blows forcefully on a stormy day; they are unable [to keep] from what they earned a [single] thing. That is what is extreme error."
    cite: "Quran 14:18 - Saheeh International"

  - englishText: "O children of Adam, take your adornment [i.e., wear your clothing] at every masjid,[1] and eat and drink, but be not excessive. Indeed, He likes not those who commit excess."
    cite: "Quran 7:31 - Saheeh International"

  - englishText: "Allāh extends provision for whom He wills and restricts [it]. And they rejoice in the worldly life, while the worldly life is not, compared to the Hereafter, except [brief] enjoyment."
    cite: "Quran 13:26 - Saheeh International"

  - englishText: "Peace [i.e., security] be upon you for what you patiently endured. And excellent is the final home."
    cite: "Quran 13:24 - Saheeh International"

  - englishText: "He sends down from the sky, rain, and valleys flow according to their capacity, and the torrent carries a rising foam. And from that [ore] which they heat in the fire, desiring adornments and utensils, is a foam like it. Thus Allāh presents [the example of] truth and falsehood. As for the foam, it vanishes, [being] cast off; but as for that which benefits the people, it remains on the earth. Thus does Allāh present examples."
    cite: "Quran 13:17 - Saheeh International"

  - englishText: "And if you are astonished,[1] [O Muḥammad] - then astonishing is their saying, When we are dust, will we indeed be [brought] into a new creation? Those are the ones who have disbelieved in their Lord, and those will have shackles[2] upon their necks, and those are the companions of the Fire; they will abide therein eternally."
    cite: "Quran 13:5 - Saheeh International"

  - englishText: "And how many a sign within the heavens and earth do they pass over while they, therefrom, are turning away."
    cite: "Quran 12:105 - Saheeh International"

  - englishText: "And to Allāh belong the unseen [aspects] of the heavens and the earth and to Him will be returned the matter, all of it, so worship Him and rely upon Him. And your Lord is not unaware of that which you do."
    cite: "Quran 11:123 - Saheeh International"

  - englishText: "Except whom your Lord has given mercy, and for that He created them. But the word of your Lord is to be fulfilled that, I will surely fill Hell with jinn and men all together."
    cite: "Quran 11:119 - Saheeh International"

  - englishText: "And O my people, give full measure and weight in justice and do not deprive the people of their due and do not commit abuse on the earth, spreading corruption."
    cite: "Quran 11:85 - Saheeh International"

  - englishText: "But if We give him a taste of favor after hardship has touched him, he will surely say, Bad times have left me. Indeed, he is exultant and boastful -"
    cite: "Quran 11:10 - Saheeh International"

  - englishText: "And if We give man a taste of mercy from Us and then We withdraw it from him, indeed, he is despairing and ungrateful."
    cite: "Quran 11:9 - Saheeh International"

  - englishText: "And it is He who created the heavens and the earth in six days - and His Throne had been upon water - that He might test you as to which of you is best in deed. But if you say, Indeed, you are resurrected after death, those who disbelieve will surely say, This is not but obvious magic."
    cite: "Quran 11:7 - Saheeh International"

  - englishText: "And if Allāh should touch you with adversity, there is no remover of it except Him; and if He intends for you good, then there is no repeller of His bounty. He causes it to reach whom He wills of His servants. And He is the Forgiving, the Merciful."
    cite: "Quran 10:107 - Saheeh International"

  - englishText: "And on the Day when He will gather them, [it will be] as if they had not remained [in the world] but an hour of the day, [and] they will know each other. Those will have lost who denied the meeting with Allāh and were not guided."
    cite: "Quran 10:45 - Saheeh International"

  - englishText: "And among them are those who listen to you. But can you cause the deaf to hear [i.e., benefit from this hearing], although they will not use reason?"
    cite: "Quran 10:42 - Saheeh International"

  - englishText: "The example of [this] worldly life is but like rain which We have sent down from the sky that the plants of the earth absorb - [those] from which men and livestock eat - until, when the earth has taken on its adornment and is beautified and its people suppose that they have capability over it, there comes to it Our command by night or by day, and We make it as a harvest,[1] as if it had not flourished yesterday. Thus do We explain in detail the signs for a people who give thought."
    cite: "Quran 10:24 - Saheeh International"

  - englishText: "But when He saves them, at once they commit injustice[1] upon the earth without right. O mankind, your injustice is only against yourselves, [being merely] the enjoyment of worldly life. Then to Us is your return, and We will inform you of what you used to do."
    cite: "Quran 10:23 - Saheeh International"

  - englishText: "It is He who enables you to travel on land and sea until, when you are in ships and they sail with them[1] by a good wind and they rejoice therein, there comes a storm wind and the waves come upon them from every place and they expect to be engulfed, they supplicate Allāh, sincere to Him in religion, If You should save us from this, we will surely be among the thankful."
    cite: "Quran 10:22 - Saheeh International"

  - englishText: "Say, If Allāh had willed, I would not have recited it to you, nor would He have made it known to you, for I had remained among you a lifetime before it.[1] Then will you not reason?"
    cite: "Quran 10:16 - Saheeh International"

  - englishText: "And when affliction touches man, he calls upon Us, whether lying on his side or sitting or standing; but when We remove from him his affliction, he continues [in disobedience] as if he had never called upon Us to [remove] an affliction that touched him. Thus is made pleasing to the transgressors that which they have been doing."
    cite: "Quran 10:12 - Saheeh International"

  - englishText: "It is He who made the sun a shining light and the moon a derived light and determined for it phases - that you may know the number of years and account [of time]. Allāh has not created this except in truth. He details the signs for a people who know."
    cite: "Quran 10:5 - Saheeh International"

  - englishText: "And say, Do [as you will], for Allāh will see your deeds, and [so will] His Messenger and the believers. And you will be returned to the Knower of the unseen and the witnessed, and He will inform you of what you used to do."
    cite: "Quran 9:105 - Saheeh International"

  - englishText: "And if you could but see when the angels take the souls of those who disbelieved...[1] They are striking their faces and their backs and [saying], Taste the punishment of the Burning Fire."
    cite: "Quran 8:50 - Saheeh International"

  - englishText: "And know that your properties and your children are but a trial and that Allāh has with Him a great reward."
    cite: "Quran 8:28 - Saheeh International"

  - englishText: "And the good land - its vegetation emerges by permission of its Lord; but that which is bad - nothing emerges except sparsely, with difficulty. Thus do We diversify the signs for a people who are grateful."
    cite: "Quran 7:58 - Saheeh International"

  - englishText: "But the Jews and the Christians say, We are the children of Allāh and His beloved. Say, Then why does He punish you for your sins? Rather, you are human beings from among those He has created. He forgives whom He wills, and He punishes whom He wills. And to Allāh belongs the dominion of the heavens and the earth and whatever is between them, and to Him is the [final] destination."
    cite: "Quran 5:18 - Saheeh International"

  - englishText: "O People of the Scripture, do not commit excess in your religion[1] or say about Allāh except the truth. The Messiah, Jesus the son of Mary, was but a messenger of Allāh and His word which He directed to Mary and a soul [created at a command] from Him. So believe in Allāh and His messengers. And do not say, Three; desist - it is better for you. Indeed, Allāh is but one God. Exalted is He above having a son. To Him belongs whatever is in the heavens and whatever is on the earth. And sufficient is Allāh as Disposer of affairs."
    cite: "Quran 4:171 - Saheeh International"

  - englishText: "If He wills, He can do away with you, O people, and bring others [in your place]. And ever is Allāh competent to do that."
    cite: "Quran 4:133 - Saheeh International"

  - englishText: "Indeed, those who disbelieve in Our verses - We will drive them into a fire. Every time their skins are roasted through, We will replace them with other skins so they may taste the punishment. Indeed, Allāh is ever Exalted in Might and Wise."
    cite: "Quran 4:56 - Saheeh International"

  - englishText: "Worship Allāh and associate nothing with Him, and to parents do good, and to relatives, orphans, the needy, the near neighbor, the neighbor farther away, the companion at your side,[1] the traveler, and those whom your right hands possess. Indeed, Allāh does not like those who are self-deluding and boastful,"
    cite: "Quran 4:36 - Saheeh International"

  - englishText: "Who remember Allāh while standing or sitting or [lying] on their sides and give thought to the creation of the heavens and the earth, [saying], Our Lord, You did not create this aimlessly; exalted are You [above such a thing]; then protect us from the punishment of the Fire."
    cite: "Quran 3:191 - Saheeh International"

  - englishText: "Every soul will taste death, and you will only be given your [full] compensation on the Day of Resurrection. So he who is drawn away from the Fire and admitted to Paradise has attained [his desire]. And what is the life of this world except the enjoyment of delusion."
    cite: "Quran 3:185 - Saheeh International"

  - englishText: "So Allāh gave them the reward of this world and the good reward of the Hereafter. And Allāh loves the doers of good."
    cite: "Quran 3:148 - Saheeh International"

  - englishText: "Muḥammad is not but a messenger. [Other] messengers have passed on before him. So if he was to die or be killed, would you turn back on your heels [to unbelief]? And he who turns back on his heels will never harm Allāh at all; but Allāh will reward the grateful."
    cite: "Quran 3:144 - Saheeh International"

  - englishText: "Or do you think that you will enter Paradise while Allāh has not yet made evident those of you who fight in His cause and made evident those who are steadfast?"
    cite: "Quran 3:142 - Saheeh International"

  - englishText: "Who spend [in the cause of Allāh] during ease and hardship and who restrain anger and who pardon the people - and Allāh loves the doers of good;"
    cite: "Quran 3:134 - Saheeh International"

  - englishText: "Whoever Allāh sends astray - there is no guide for him. And He leaves them in their transgression, wandering blindly."
    cite: "Quran 7:186 - Saheeh International"

  - englishText: "And We have certainly created for Hell many of the jinn and mankind. They have hearts with which they do not understand, they have eyes with which they do not see, and they have ears with which they do not hear. Those are like livestock; rather, they are more astray.[1] It is they who are the heedless."
    cite: "Quran 7:179 - Saheeh International"

  - englishText: "I will turn away from My signs those who are arrogant upon the earth without right; and if they should see every sign, they will not believe in it. And if they see the way of consciousness,[1] they will not adopt it as a way; but if they see the way of error, they will adopt it as a way. That is because they have denied Our signs and they were heedless of them."
    cite: "Quran 7:146 - Saheeh International"

  - englishText: "Who took their religion as distraction and amusement and whom the worldly life deluded. So today We will forget them just as they forgot the meeting of this Day of theirs and for having rejected Our verses."
    cite: "Quran 7:51 - Saheeh International"

  - englishText: "And a believing man from the family of Pharaoh who concealed his faith said, Do you kill a man [merely] because he says, 'My Lord is Allāh' while he has brought you clear proofs from your Lord? And if he should be lying, then upon him is [the consequence of] his lie; but if he should be truthful, there will strike you some of what he promises you. Indeed, Allāh does not guide one who is a transgressor and a liar."
    cite: "Quran 40:28 - Saheeh International"
